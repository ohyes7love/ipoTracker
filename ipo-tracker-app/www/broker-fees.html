<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>수수료 관리 - 공모주 수익 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f6fa; padding-bottom: 70px; font-size: 14px; }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
            background: #0d6efd; display: flex; border-top: 1px solid #0b5ed7;
        }
        .bottom-nav a {
            flex: 1; color: rgba(255,255,255,0.7); text-decoration: none;
            text-align: center; padding: 10px 0; font-size: 12px; line-height: 1.3;
        }
        .bottom-nav a.active { color: #fff; font-weight: 700; }
        .bottom-nav a span { display: block; font-size: 18px; }

        .top-bar {
            background: #0d6efd; color: #fff; padding: 12px 16px;
            position: sticky; top: 0; z-index: 100;
        }
        .top-bar h1 { font-size: 16px; margin: 0; font-weight: 700; }

        .content { padding: 12px; }

        .fee-card {
            background: #fff; border-radius: 12px; padding: 12px 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 8px;
            display: flex; align-items: center; gap: 10px;
        }
        .fee-name { font-weight: 700; font-size: 14px; min-width: 70px; }
        .fee-input {
            flex: 1; border: 1px solid #dee2e6; border-radius: 8px;
            padding: 7px 10px; font-size: 14px; text-align: right;
        }
        .btn-save {
            background: #0d6efd; color: #fff; border: none;
            border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 600;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <h1>수수료 관리</h1>
</div>

<div class="content">
    <div id="feeList"></div>
</div>

<nav class="bottom-nav">
    <a href="index.html"><span>📊</span>대시보드</a>
    <a href="ipo.html"><span>📋</span>청약내역</a>
    <a href="calendar.html"><span>📅</span>캘린더</a>
    <a href="broker-fees.html" class="active"><span>💰</span>수수료</a>
</nav>

<script src="js/db.js"></script>
<script>
    async function loadFees() {
        const fees = await getAllBrokerFees();
        fees.sort((a, b) => a.brokerName.localeCompare(b.brokerName, 'ko'));
        const container = document.getElementById('feeList');
        container.innerHTML = fees.map(f => `
            <div class="fee-card">
                <span class="fee-name">${f.brokerName}</span>
                <input type="number" class="fee-input" id="fee_${f.brokerName}"
                       value="${f.feeAmount}" inputmode="numeric">
                <button class="btn-save" onclick="saveFee('${f.brokerName}')">저장</button>
            </div>
        `).join('');
    }

    async function saveFee(name) {
        const val = parseInt(document.getElementById('fee_' + name).value) || 0;
        await updateBrokerFee(name, val);
        alert('저장되었습니다.');
    }

    loadFees();
</script>
</body>
</html>
