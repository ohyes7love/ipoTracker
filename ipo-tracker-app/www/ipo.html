<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>청약 내역 - 공모주 수익 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f6fa; padding-bottom: 80px; font-size: 14px; }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
            background: #0d6efd; display: flex; border-top: 1px solid #0b5ed7;
        }
        .bottom-nav a {
            flex: 1; color: rgba(255,255,255,0.7); text-decoration: none;
            text-align: center; padding: 10px 0; font-size: 10px; line-height: 1.3;
        }
        .bottom-nav a.active { color: #fff; font-weight: 700; }
        .bottom-nav a span { display: block; font-size: 18px; }

        .top-bar {
            background: #0d6efd; color: #fff; padding: 12px 16px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .top-bar h1 { font-size: 16px; margin: 0; font-weight: 700; }

        .filter-bar {
            padding: 10px 12px; background: #fff;
            border-bottom: 1px solid #e0e0e0;
            display: flex; align-items: center; gap: 8px;
        }
        .filter-bar select { font-size: 14px; padding: 6px 10px; border-radius: 8px; border: 1px solid #ced4da; }
        .filter-bar .btn-add {
            margin-left: auto; background: #0d6efd; color: #fff;
            border: none; border-radius: 8px; padding: 7px 16px; font-size: 14px; font-weight: 600;
        }

        .ipo-list { padding: 10px 12px; }

        .ipo-card {
            background: #fff; border-radius: 12px; margin-bottom: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden;
        }
        .ipo-card-header {
            padding: 10px 14px 6px;
            display: flex; align-items: flex-start; justify-content: space-between;
        }
        .stock-name { font-size: 15px; font-weight: 700; color: #222; }
        .card-actions { display: flex; gap: 4px; flex-shrink: 0; }
        .account-checks { display: flex; gap: 8px; flex-wrap: wrap; }
        .acc-check {
            display: flex; align-items: center; gap: 5px;
            background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 20px;
            padding: 5px 12px; font-size: 13px; cursor: pointer; user-select: none;
        }
        .acc-check input { cursor: pointer; accent-color: #0d6efd; width: 15px; height: 15px; }
        .acc-check:has(input:checked) { background: #e7f1ff; border-color: #0d6efd; color: #0d6efd; font-weight: 600; }
        .acc-tag {
            display: inline-block; background: #e7f1ff; color: #0d6efd;
            border-radius: 10px; padding: 1px 8px; font-size: 11px; font-weight: 600; margin-right: 3px;
        }
        .btn-copy {
            background: #e8f4fd; color: #0b5ed7; border: 1px solid #9ec5fe;
            border-radius: 6px; padding: 3px 10px; font-size: 12px; cursor: pointer;
        }
        .btn-edit {
            background: #fff3cd; color: #856404; border: 1px solid #ffc107;
            border-radius: 6px; padding: 3px 10px; font-size: 12px; cursor: pointer;
        }
        .btn-del {
            background: #f8d7da; color: #842029; border: 1px solid #f5c2c7;
            border-radius: 6px; padding: 3px 10px; font-size: 12px; cursor: pointer;
        }
        .ipo-card-body { padding: 4px 14px 12px; }
        .info-row { display: flex; flex-wrap: wrap; gap: 4px 16px; color: #555; font-size: 12px; margin-bottom: 4px; }
        .info-row span { white-space: nowrap; }
        .profit-row {
            display: flex; justify-content: flex-end; align-items: baseline;
            gap: 8px; margin-top: 6px;
        }
        .profit-val { font-size: 16px; font-weight: 700; }
        .profit-rate { font-size: 13px; font-weight: 600; }
        .profit-plus { color: #dc3545; }
        .profit-minus { color: #0d6efd; }
        .profit-zero  { color: #6c757d; }

        .total-bar {
            position: fixed; bottom: 56px; left: 0; right: 0; z-index: 99;
            background: #1e2a3a; color: #fff; padding: 10px 16px;
            display: flex; align-items: center; justify-content: space-between;
            font-size: 14px;
        }
        .total-bar .label { color: #adb5bd; }
        .total-bar .amount { font-size: 18px; font-weight: 700; }

        #stockAutocomplete {
            display: none; position: fixed; z-index: 9999;
            background: #fff; border: 1px solid #ced4da; border-top: none;
            border-radius: 0 0 10px 10px; max-height: 220px; overflow-y: auto;
            box-shadow: 0 6px 16px rgba(0,0,0,0.18);
        }
        #stockAutocomplete div {
            padding: 11px 14px; cursor: pointer;
            font-size: 14px; border-bottom: 1px solid #f0f0f0;
        }
        #stockAutocomplete div:last-child { border-bottom: none; }
        #stockAutocomplete div:active, #stockAutocomplete div:hover { background: #e9f0ff; }

        .modal-dialog { margin: 0; max-width: 100%; }
        .modal-content { border-radius: 16px 16px 0 0; }
        .modal.fade  .modal-dialog { transition: opacity 0.2s ease; opacity: 0; }
        .modal.show  .modal-dialog { opacity: 1; }
        @media (min-width: 576px) {
            .modal-dialog { margin: 1.75rem auto; max-width: 500px; }
            .modal-content { border-radius: 12px; }
        }

        .form-label { font-size: 13px; font-weight: 600; color: #495057; margin-bottom: 4px; }
        .form-control, .form-select { font-size: 14px; border-radius: 8px; }
        .modal-header { border-bottom: 1px solid #eee; padding: 14px 16px; }
        .modal-footer { border-top: 1px solid #eee; padding: 10px 16px; }
        .modal-body { padding: 14px 16px; max-height: 70vh; overflow-y: auto; }

        .empty-state { text-align: center; padding: 48px 0; color: #adb5bd; font-size: 14px; }
    </style>
</head>
<body>

<div class="top-bar">
    <h1>청약 내역</h1>
</div>

<div class="filter-bar">
    <select id="yearSelect"></select>
    <button class="btn-add" onclick="openCreateModal()">+ 등록</button>
</div>

<div class="ipo-list" id="ipoList">
    <div class="empty-state">데이터를 불러오는 중...</div>
</div>

<div class="total-bar">
    <span class="label">합계 수익</span>
    <span class="amount profit-zero" id="totalSum">0 원</span>
</div>

<nav class="bottom-nav">
    <a href="index.html"><span>📊</span>대시보드</a>
    <a href="ipo.html" class="active"><span>📋</span>청약내역</a>
    <a href="calendar.html"><span>📅</span>캘린더</a>
    <a href="checklist.html"><span>✅</span>체크</a>
    <a href="stats.html"><span>📈</span>통계</a>
</nav>

<div id="stockAutocomplete"></div>

<!-- 등록/수정 모달 -->
<div class="modal fade" id="ipoModal" tabindex="-1">
    <div class="modal-dialog" style="position:fixed;bottom:0;width:100%;margin:0;">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">청약 등록</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="ipoForm" autocomplete="off">
                    <input type="hidden" id="formId">

                    <div class="mb-3">
                        <label class="form-label">공모주명</label>
                        <input type="text" class="form-control" id="stockName"
                               required placeholder="종목명 검색 (예: 삼성, 카카오)">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">계좌</label>
                        <div class="account-checks">
                            <label class="acc-check"><input type="checkbox" name="account" value="경록"> 경록</label>
                            <label class="acc-check"><input type="checkbox" name="account" value="지선"> 지선</label>
                            <label class="acc-check"><input type="checkbox" name="account" value="하준"> 하준</label>
                            <label class="acc-check"><input type="checkbox" name="account" value="하민"> 하민</label>
                        </div>
                    </div>

                    <div class="row g-2 mb-3">
                        <div class="col-7">
                            <label class="form-label">증권사</label>
                            <select class="form-select" id="broker" required>
                                <option value="">선택</option>
                            </select>
                        </div>
                        <div class="col-5">
                            <label class="form-label">청약수수료</label>
                            <input type="number" class="form-control" id="subscriptionFee" value="0" inputmode="numeric">
                        </div>
                    </div>

                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label">공모가 (원)</label>
                            <input type="number" class="form-control" id="offeringPrice" required inputmode="numeric">
                        </div>
                        <div class="col-6">
                            <label class="form-label">매도수량 (주)</label>
                            <input type="number" class="form-control" id="soldQty" value="0" inputmode="numeric">
                        </div>
                    </div>

                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label">매도일</label>
                            <input type="date" class="form-control" id="soldDate">
                        </div>
                        <div class="col-6">
                            <label class="form-label">매도가 (원)</label>
                            <input type="number" class="form-control" id="soldPrice" inputmode="numeric">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">세금+매도수수료 (원)</label>
                        <input type="number" class="form-control" id="taxAndFee" value="0" inputmode="numeric">
                    </div>

                    <hr class="my-2">
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label">청약시작일</label>
                            <input type="date" class="form-control" id="subscriptionStartDate">
                        </div>
                        <div class="col-6">
                            <label class="form-label">청약종료일</label>
                            <input type="date" class="form-control" id="subscriptionEndDate">
                        </div>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">상장일</label>
                        <input type="date" class="form-control" id="listingDate">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary w-50" data-bs-dismiss="modal">취소</button>
                <button type="button" class="btn btn-primary w-50" onclick="saveIpo()">저장</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/kokstock.js"></script>
<script src="js/db.js"></script>
<script>
    const currentYear = new Date().getFullYear();
    let brokerFees = {};
    let localStocks = [];

    // 연도 셀렉터
    (function initYearSelect() {
        const sel = document.getElementById('yearSelect');
        for (let y = currentYear - 2; y <= currentYear + 1; y++) {
            const opt = document.createElement('option');
            opt.value = y; opt.textContent = y + '년';
            if (y === currentYear) opt.selected = true;
            sel.appendChild(opt);
        }
    })();

    // 증권사 수수료 로드
    getAllBrokerFees().then(fees => {
        const sel = document.getElementById('broker');
        fees.sort((a, b) => a.brokerName.localeCompare(b.brokerName, 'ko'));
        fees.forEach(f => {
            brokerFees[f.brokerName] = f.feeAmount;
            const opt = document.createElement('option');
            opt.value = f.brokerName;
            opt.textContent = f.brokerName;
            sel.appendChild(opt);
        });
    });

    // 로컬 DB 종목 로드
    getAllIpoStocks().then(data => { localStocks = data; }).catch(() => {});

    // ── 자동완성 ─────────────────────────────────────────
    const stockInput = document.getElementById('stockName');
    const acDiv      = document.getElementById('stockAutocomplete');
    let acTimer = null;

    function renderAC(dbHits, kokSchedules) {
        const kokOnly = kokSchedules;
        if (!dbHits.length && !kokOnly.length) { acDiv.style.display = 'none'; return; }

        const r = stockInput.getBoundingClientRect();
        acDiv.style.top   = r.bottom + 'px';
        acDiv.style.left  = r.left + 'px';
        acDiv.style.width = r.width + 'px';
        acDiv.innerHTML   = '';

        // DB에 저장된 종목 (공모가 표시)
        dbHits.forEach(s => {
            const div = document.createElement('div');
            div.textContent = s.offeringPrice
                ? s.stockName + ' (' + Number(s.offeringPrice).toLocaleString() + '원)'
                : s.stockName;
            const pick = () => {
                stockInput.value = s.stockName;
                if (s.offeringPrice) document.getElementById('offeringPrice').value = s.offeringPrice;
                acDiv.style.display = 'none';
            };
            div.addEventListener('mousedown',  e => { e.preventDefault(); pick(); });
            div.addEventListener('touchstart', e => { e.preventDefault(); pick(); }, { passive: false });
            acDiv.appendChild(div);
        });

        // kokstock 공모 일정 종목 (청약일 + 확정공모가 자동채움)
        kokOnly.forEach(s => {
            const div = document.createElement('div');
            div.style.color = '#0d6efd';
            const sub = s.subscriptionStartDate ? s.subscriptionStartDate.slice(5).replace('-','/') : '';
            div.textContent = s.corpName + (sub ? '  청약 ' + sub : '');
            const pick = async () => {
                stockInput.value = s.corpName;
                if (s.subscriptionStartDate) document.getElementById('subscriptionStartDate').value = s.subscriptionStartDate;
                if (s.subscriptionEndDate)   document.getElementById('subscriptionEndDate').value   = s.subscriptionEndDate;
                if (s.listingDate)           document.getElementById('listingDate').value           = s.listingDate;
                acDiv.style.display = 'none';
                // 확정공모가 자동채움
                if (s.idx) {
                    try {
                        const d = await getKokstockDetail(s.idx);
                        const price = ((d.info || {})['확정공모가'] || '').replace(/[^0-9]/g, '');
                        if (price) document.getElementById('offeringPrice').value = price;
                    } catch (e) {}
                }
            };
            div.addEventListener('mousedown',  e => { e.preventDefault(); pick(); });
            div.addEventListener('touchstart', e => { e.preventDefault(); pick(); }, { passive: false });
            acDiv.appendChild(div);
        });

        acDiv.style.display = 'block';
    }

    function showAC(val) {
        if (!val) { acDiv.style.display = 'none'; return; }
        const dbHits = localStocks.filter(s => s.stockName.includes(val));
        renderAC(dbHits, []);
        clearTimeout(acTimer);
        acTimer = setTimeout(() => {
            searchKokstockSchedule(val).then(schedules => {
                if (stockInput.value.trim() === val) renderAC(dbHits, schedules);
            }).catch(() => {});
        }, 300);
    }

    stockInput.addEventListener('input',  function () { showAC(this.value.trim()); });
    stockInput.addEventListener('focus',  function () { showAC(this.value.trim()); });
    stockInput.addEventListener('blur',   () => setTimeout(() => { acDiv.style.display = 'none'; }, 200));
    document.getElementById('ipoModal').addEventListener('hide.bs.modal', () => { acDiv.style.display = 'none'; });

    document.getElementById('broker').addEventListener('change', function () {
        const fee = brokerFees[this.value];
        if (fee !== undefined) document.getElementById('subscriptionFee').value = fee;
    });

    // ── 수익 표시 유틸 ───────────────────────────────────
    function fmt(v) { return v != null ? Number(v).toLocaleString() : '-'; }
    function profitClass(p) {
        if (p == null) return 'profit-zero';
        return p > 0 ? 'profit-plus' : (p < 0 ? 'profit-minus' : 'profit-zero');
    }
    function profitSign(p) { return (p != null && p > 0) ? '+' : ''; }

    // ── 목록 로드 ────────────────────────────────────────
    async function loadTable(year) {
        const list = (await getIposByYear(year))
            .sort((a, b) => (b.listingDate || '').localeCompare(a.listingDate || ''));
        const container = document.getElementById('ipoList');
        const totalEl   = document.getElementById('totalSum');

        if (list.length === 0) {
            container.innerHTML = '<div class="empty-state">등록된 청약 내역이 없습니다.</div>';
            totalEl.textContent = '0 원';
            totalEl.className   = 'amount profit-zero';
            return;
        }

        let totalProfit = 0;
        let html = '';
        list.forEach(d => {
            const pc         = profitClass(d.profit);
            const profitText = d.profit != null ? profitSign(d.profit) + fmt(d.profit) + '원' : '-';
            const rateText   = d.profitRate != null
                ? profitSign(d.profitRate) + d.profitRate.toFixed(2) + '%' : '';

            if (d.profit != null) totalProfit += d.profit;

            const dataStr = JSON.stringify(d).replace(/'/g, '&#39;');
            html += `<div class="ipo-card">
  <div class="ipo-card-header">
    <span class="stock-name">${d.stockName}</span>
    <div class="card-actions">
      <button class="btn-copy" onclick='openCopyModal(${dataStr})'>복사</button>
      <button class="btn-edit" onclick='openEditModal(${dataStr})'>수정</button>
      <button class="btn-del"  onclick="deleteItem(${d.id})">삭제</button>
    </div>
  </div>
  <div class="ipo-card-body">
    <div class="info-row">
      <span>🏢 ${d.broker}</span>
      <span>📅 ${d.soldDate || '미매도'}</span>
    </div>
    ${d.accounts ? `<div class="info-row">${d.accounts.split(',').map(a => `<span class="acc-tag">${a.trim()}</span>`).join('')}</div>` : ''}
    <div class="info-row">
      <span>공모가 ${fmt(d.offeringPrice)}원</span>
      ${d.soldPrice ? `<span>→ 매도가 ${fmt(d.soldPrice)}원</span>` : ''}
      <span>수량 ${fmt(d.soldQty)}주</span>
    </div>
    <div class="info-row">
      ${d.taxAndFee     ? `<span>세금+수수료 ${fmt(d.taxAndFee)}원</span>`    : ''}
      ${d.subscriptionFee ? `<span>청약수수료 ${fmt(d.subscriptionFee)}원</span>` : ''}
    </div>
    <div class="profit-row">
      <span class="profit-val ${pc}">${profitText}</span>
      ${rateText ? `<span class="profit-rate ${pc}">(${rateText})</span>` : ''}
    </div>
  </div>
</div>`;
        });

        container.innerHTML = html;
        totalEl.textContent = profitSign(totalProfit) + totalProfit.toLocaleString() + ' 원';
        totalEl.className   = 'amount ' + profitClass(totalProfit);
    }

    // ── 모달 ─────────────────────────────────────────────
    function openCreateModal() {
        document.getElementById('modalTitle').textContent = '청약 등록';
        document.getElementById('ipoForm').reset();
        document.getElementById('formId').value              = '';
        document.getElementById('taxAndFee').value           = 0;
        document.getElementById('subscriptionFee').value     = 0;
        document.getElementById('soldQty').value             = 0;
        document.getElementById('subscriptionStartDate').value = '';
        document.getElementById('subscriptionEndDate').value   = '';
        document.getElementById('listingDate').value           = '';
        setAccounts('');
        new bootstrap.Modal(document.getElementById('ipoModal')).show();
    }

    function setAccounts(csv) {
        document.querySelectorAll('input[name="account"]').forEach(cb => {
            cb.checked = csv ? csv.split(',').map(s => s.trim()).includes(cb.value) : false;
        });
    }
    function getAccounts() {
        return [...document.querySelectorAll('input[name="account"]:checked')].map(cb => cb.value).join(',');
    }

    function openCopyModal(d) {
        openEditModal(d);
        document.getElementById('modalTitle').textContent = '청약 복사';
        document.getElementById('formId').value = '';
    }

    function openEditModal(d) {
        document.getElementById('modalTitle').textContent      = '청약 수정';
        document.getElementById('formId').value                = d.id;
        document.getElementById('stockName').value             = d.stockName;
        document.getElementById('broker').value                = d.broker;
        document.getElementById('offeringPrice').value         = d.offeringPrice;
        document.getElementById('soldQty').value               = d.soldQty || 0;
        document.getElementById('soldDate').value              = d.soldDate || '';
        document.getElementById('soldPrice').value             = d.soldPrice || '';
        document.getElementById('taxAndFee').value             = d.taxAndFee || 0;
        document.getElementById('subscriptionFee').value       = d.subscriptionFee || 0;
        document.getElementById('subscriptionStartDate').value = d.subscriptionStartDate || '';
        document.getElementById('subscriptionEndDate').value   = d.subscriptionEndDate || '';
        document.getElementById('listingDate').value           = d.listingDate || '';
        setAccounts(d.accounts || '');
        new bootstrap.Modal(document.getElementById('ipoModal')).show();
    }

    async function saveIpo() {
        const id   = document.getElementById('formId').value;
        const year = parseInt(document.getElementById('yearSelect').value);
        const body = {
            stockName:             document.getElementById('stockName').value,
            broker:                document.getElementById('broker').value,
            offeringPrice:         parseInt(document.getElementById('offeringPrice').value),
            soldQty:               parseInt(document.getElementById('soldQty').value) || 0,
            soldDate:              document.getElementById('soldDate').value || null,
            soldPrice:             document.getElementById('soldPrice').value
                                       ? parseInt(document.getElementById('soldPrice').value) : null,
            taxAndFee:             parseInt(document.getElementById('taxAndFee').value) || 0,
            subscriptionFee:       parseInt(document.getElementById('subscriptionFee').value) || 0,
            subscriptionStartDate: document.getElementById('subscriptionStartDate').value || null,
            subscriptionEndDate:   document.getElementById('subscriptionEndDate').value || null,
            listingDate:           document.getElementById('listingDate').value || null,
            accounts:              getAccounts() || null,
            year
        };

        const saved = id ? await updateIpo(id, body) : await createIpo(body);

        bootstrap.Modal.getInstance(document.getElementById('ipoModal')).hide();
        loadTable(year);

        // 로컬 종목 캐시 업데이트
        if (saved && saved.stockName && !localStocks.find(s => s.stockName === saved.stockName)) {
            localStocks.push({ stockName: saved.stockName, offeringPrice: saved.offeringPrice });
        }

        // 체크리스트에서 넘어온 경우: 해당 계좌의 registered 플래그 업데이트
        if (_checklistSource && _checklistSource.corpName === saved.stockName) {
            const cl = await getChecklist(_checklistSource.corpName);
            if (cl && cl.accounts && cl.accounts[_checklistSource.acc]) {
                cl.accounts[_checklistSource.acc].registered = true;
                await saveChecklist(cl);
            }
            _checklistSource = null;
        }
    }

    async function deleteItem(id) {
        if (!confirm('삭제하시겠습니까?')) return;
        await deleteIpo(id);
        loadTable(document.getElementById('yearSelect').value);
    }

    document.getElementById('yearSelect').addEventListener('change', function () {
        loadTable(this.value);
    });

    loadTable(currentYear);

    // ── 캘린더/체크리스트에서 넘어온 경우 자동 등록 모달 오픈 ──
    let _checklistSource = null; // 체크리스트에서 넘어온 경우 { corpName, acc }

    (function checkCalendarPrefill() {
        const raw = sessionStorage.getItem('calendarPrefill');
        if (!raw) return;
        sessionStorage.removeItem('calendarPrefill');
        try {
            const p = JSON.parse(raw);
            // 체크리스트에서 넘어온 경우 registered 플래그 업데이트용 저장
            if (p.accounts && p.stockName) {
                _checklistSource = { corpName: p.stockName, acc: p.accounts };
            }
            setTimeout(() => {
                document.getElementById('modalTitle').textContent = '청약 등록';
                document.getElementById('ipoForm').reset();
                document.getElementById('formId').value              = '';
                document.getElementById('taxAndFee').value           = 0;
                document.getElementById('subscriptionFee').value     = 0;
                document.getElementById('soldQty').value             = 0;
                if (p.stockName)             document.getElementById('stockName').value             = p.stockName;
                if (p.subscriptionStartDate) document.getElementById('subscriptionStartDate').value = p.subscriptionStartDate;
                if (p.subscriptionEndDate)   document.getElementById('subscriptionEndDate').value   = p.subscriptionEndDate;
                if (p.listingDate)           document.getElementById('listingDate').value           = p.listingDate;
                if (p.offeringPrice)         document.getElementById('offeringPrice').value         = p.offeringPrice;
                if (p.soldQty)               document.getElementById('soldQty').value               = p.soldQty;
                setAccounts(p.accounts || '');
                new bootstrap.Modal(document.getElementById('ipoModal')).show();
            }, 300);
        } catch (e) { console.warn('prefill parse error', e); }
    })();
</script>
</body>
</html>
