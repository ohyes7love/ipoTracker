<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수수료 관리 - 공모주 수익 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">공모주 수익 관리</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/">대시보드</a>
            <a class="nav-link" href="/ipo">청약 내역</a>
            <a class="nav-link active" href="/broker-fees">수수료 관리</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h4>증권사 수수료 관리</h4>
    <table class="table table-bordered table-hover mt-3" style="max-width:500px">
        <thead class="table-dark">
            <tr><th>증권사</th><th>수수료 (원)</th><th>관리</th></tr>
        </thead>
        <tbody id="feeTableBody"></tbody>
    </table>
</div>
<script>
    function loadFees() {
        fetch('/api/broker-fees').then(r => r.json()).then(fees => {
            const tbody = document.getElementById('feeTableBody');
            tbody.innerHTML = '';
            fees.forEach(f => {
                tbody.innerHTML += `<tr>
                    <td>${f.brokerName}</td>
                    <td><input type="number" class="form-control form-control-sm" id="fee_${f.brokerName}" value="${f.feeAmount}" style="width:120px"></td>
                    <td><button class="btn btn-outline-primary btn-sm" onclick="updateFee('${f.brokerName}')">저장</button></td>
                </tr>`;
            });
        });
    }

    function updateFee(name) {
        const val = document.getElementById('fee_' + name).value;
        fetch('/api/broker-fees/' + encodeURIComponent(name), {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ feeAmount: parseInt(val) })
        }).then(r => r.json()).then(() => {
            alert('저장되었습니다.');
        });
    }

    loadFees();
</script>
</body>
</html>
