<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공모주 수익 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">공모주 수익 관리</a>
        <div class="navbar-nav">
            <a class="nav-link active" href="/">대시보드</a>
            <a class="nav-link" href="/ipo">청약 내역</a>
            <a class="nav-link" href="/broker-fees">수수료 관리</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <div class="row mb-3">
        <div class="col-auto">
            <label class="form-label fw-bold">연도 선택</label>
            <select id="yearSelect" class="form-select"></select>
        </div>
    </div>
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card text-white bg-success">
                <div class="card-body text-center">
                    <h5 class="card-title">연간 총 수익</h5>
                    <h2 id="totalProfit" class="card-text">0 원</h2>
                </div>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header"><h5 class="mb-0">월별 수익 현황</h5></div>
                <div class="card-body">
                    <canvas id="monthlyChart" height="100"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    const currentYear = new Date().getFullYear();
    (function initYearSelect() {
        const sel = document.getElementById('yearSelect');
        for (let y = currentYear - 2; y <= currentYear + 1; y++) {
            const opt = document.createElement('option');
            opt.value = y; opt.textContent = y;
            if (y === currentYear) opt.selected = true;
            sel.appendChild(opt);
        }
    })();

    let chart;

    function loadData(year) {
        fetch('/api/ipo/monthly?year=' + year)
            .then(r => r.json())
            .then(data => {
                const labels = data.map(d => d.month + '월');
                const profits = data.map(d => d.totalProfit);
                const total = profits.reduce((a, b) => a + b, 0);
                document.getElementById('totalProfit').textContent = total.toLocaleString() + ' 원';

                const colors = profits.map(v => v >= 0 ? 'rgba(40,167,69,0.7)' : 'rgba(220,53,69,0.7)');

                if (chart) chart.destroy();
                chart = new Chart(document.getElementById('monthlyChart'), {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: '수익 (원)',
                            data: profits,
                            backgroundColor: colors,
                            borderColor: colors,
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: v => v.toLocaleString() + '원'
                                }
                            }
                        },
                        plugins: {
                            tooltip: {
                                callbacks: {
                                    label: ctx => ctx.parsed.y.toLocaleString() + ' 원'
                                }
                            }
                        }
                    }
                });
            });
    }

    document.getElementById('yearSelect').addEventListener('change', function() {
        loadData(this.value);
    });

    loadData(currentYear);
</script>
</body>
</html>
