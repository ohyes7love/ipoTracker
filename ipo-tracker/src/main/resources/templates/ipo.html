<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>청약 내역 - 공모주 수익 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .table { font-size: 0.85rem; }
        .table th, .table td { white-space: nowrap; vertical-align: middle; }
        .profit-plus { color: #dc3545; font-weight: bold; }
        .profit-minus { color: #0d6efd; font-weight: bold; }
        .autocomplete-wrap { position: relative; }
        .autocomplete-list { position: absolute; z-index: 1050; background: #fff; border: 1px solid #ccc; max-height: 200px; overflow-y: auto; width: 100%; }
        .autocomplete-list div { padding: 6px 10px; cursor: pointer; font-size: 0.85rem; }
        .autocomplete-list div:hover { background: #e9ecef; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">공모주 수익 관리</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/">대시보드</a>
            <a class="nav-link active" href="/ipo">청약 내역</a>
            <a class="nav-link" href="/broker-fees">수수료 관리</a>
        </div>
    </div>
</nav>
<div class="container-fluid mt-3">
    <div class="row mb-3 align-items-end">
        <div class="col-auto">
            <label class="form-label fw-bold">연도</label>
            <select id="yearSelect" class="form-select form-select-sm"></select>
        </div>
        <div class="col-auto">
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#ipoModal" onclick="openCreateModal()">+ 등록</button>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-bordered table-hover table-sm">
            <thead class="table-dark">
                <tr>
                    <th>공모주명</th><th>증권사</th>
                    <th>공모가</th><th>청약수량</th><th>배정수량</th><th>매도수량</th>
                    <th>매도일</th><th>매도가</th>
                    <th>세금+수수료</th><th>청약수수료</th>
                    <th>수익</th><th>수익률</th><th>관리</th>
                </tr>
            </thead>
            <tbody id="ipoTableBody"></tbody>
        </table>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="ipoModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">청약 등록</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="ipoForm" autocomplete="off">
                    <input type="hidden" id="formId">
                    <div class="row g-2">
                        <div class="col-md-5">
                            <label class="form-label">공모주명</label>
                            <div class="autocomplete-wrap">
                                <input type="text" class="form-control form-control-sm" id="stockName" required placeholder="종목명 입력 또는 선택">
                                <div id="stockAutocomplete" class="autocomplete-list" style="display:none"></div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">증권사</label>
                            <select class="form-select form-select-sm" id="broker" required>
                                <option value="">선택</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">청약수수료</label>
                            <input type="number" class="form-control form-control-sm" id="subscriptionFee" value="0">
                        </div>
                    </div>
                    <div class="row g-2 mt-1">
                        <div class="col-md-3">
                            <label class="form-label">공모가</label>
                            <input type="number" class="form-control form-control-sm" id="offeringPrice" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">청약수량</label>
                            <input type="number" class="form-control form-control-sm" id="subscriptionQty" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">배정수량</label>
                            <input type="number" class="form-control form-control-sm" id="allocatedQty" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">매도수량</label>
                            <input type="number" class="form-control form-control-sm" id="soldQty" value="0">
                        </div>
                    </div>
                    <div class="row g-2 mt-1">
                        <div class="col-md-3">
                            <label class="form-label">매도일</label>
                            <input type="date" class="form-control form-control-sm" id="soldDate">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">매도가</label>
                            <input type="number" class="form-control form-control-sm" id="soldPrice">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">세금+매도수수료</label>
                            <input type="number" class="form-control form-control-sm" id="taxAndFee" value="0">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">취소</button>
                <button type="button" class="btn btn-primary btn-sm" onclick="saveIpo()">저장</button>
            </div>
        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const currentYear = new Date().getFullYear();
    let brokerFees = {};
    let ipoStocks = [];

    (function initYearSelect() {
        const sel = document.getElementById('yearSelect');
        for (let y = currentYear - 2; y <= currentYear + 1; y++) {
            const opt = document.createElement('option');
            opt.value = y;
            opt.textContent = y;
            if (y === currentYear) opt.selected = true;
            sel.appendChild(opt);
        }
    })();

    // Load broker fees
    fetch('/api/broker-fees').then(r => r.json()).then(fees => {
        const sel = document.getElementById('broker');
        fees.forEach(f => {
            brokerFees[f.brokerName] = f.feeAmount;
            const opt = document.createElement('option');
            opt.value = f.brokerName;
            opt.textContent = f.brokerName;
            sel.appendChild(opt);
        });
    });

    // Load IPO stocks for autocomplete (로컬 DB + DART + KRX 전체 종목 병합)
    function loadStocks() {
        fetch('/api/ipo/stocks').then(r => r.json()).then(data => {
            ipoStocks = data;

            // DART 공모주 추가
            fetch('/api/dart/ipos').then(r => r.json()).then(dartData => {
                if (!Array.isArray(dartData)) return;
                const names = new Set(ipoStocks.map(s => s.stockName));
                dartData.forEach(item => {
                    if (!names.has(item.corpName)) {
                        ipoStocks.push({ stockName: item.corpName, offeringPrice: null });
                        names.add(item.corpName);
                    }
                });
            }).catch(() => {});

            // KRX 전체 상장 종목 추가 (백그라운드 로딩)
            fetch('/api/krx/stocks').then(r => r.json()).then(krxData => {
                if (!Array.isArray(krxData)) return;
                const names = new Set(ipoStocks.map(s => s.stockName));
                krxData.forEach(item => {
                    if (item.stockName && !names.has(item.stockName)) {
                        ipoStocks.push({ stockName: item.stockName, offeringPrice: null });
                        names.add(item.stockName);
                    }
                });
            }).catch(() => {});
        });
    }
    loadStocks();

    // Autocomplete
    const stockNameInput = document.getElementById('stockName');
    const autocompleteDiv = document.getElementById('stockAutocomplete');

    function showAutocomplete(val) {
        const matches = val
            ? ipoStocks.filter(s => s.stockName.includes(val))
            : ipoStocks;
        if (matches.length === 0) { autocompleteDiv.style.display = 'none'; return; }
        autocompleteDiv.innerHTML = '';
        matches.forEach(s => {
            const div = document.createElement('div');
            div.textContent = s.offeringPrice != null
                ? s.stockName + ' - ' + Number(s.offeringPrice).toLocaleString() + '원'
                : s.stockName;
            div.addEventListener('mousedown', function(e) {
                e.preventDefault();
                stockNameInput.value = s.stockName;
                if (s.offeringPrice != null) document.getElementById('offeringPrice').value = s.offeringPrice;
                autocompleteDiv.style.display = 'none';
            });
            autocompleteDiv.appendChild(div);
        });
        autocompleteDiv.style.display = 'block';
    }

    stockNameInput.addEventListener('focus', function() {
        showAutocomplete(this.value.trim());
    });

    stockNameInput.addEventListener('input', function() {
        showAutocomplete(this.value.trim());
    });

    stockNameInput.addEventListener('blur', function() {
        setTimeout(() => { autocompleteDiv.style.display = 'none'; }, 200);
    });

    // Auto-fill subscription fee when broker changes
    document.getElementById('broker').addEventListener('change', function() {
        const fee = brokerFees[this.value];
        if (fee !== undefined) document.getElementById('subscriptionFee').value = fee;
    });

    function fmt(v) { return v != null ? Number(v).toLocaleString() : '-'; }

    function loadTable(year) {
        fetch('/api/ipo?year=' + year).then(r => r.json()).then(list => {
            const tbody = document.getElementById('ipoTableBody');
            tbody.innerHTML = '';
            list.forEach(d => {
                const profitClass = d.profit != null ? (d.profit >= 0 ? 'profit-plus' : 'profit-minus') : '';
                const profitRate = d.profitRate != null ? d.profitRate.toFixed(2) + '%' : '-';
                tbody.innerHTML += `<tr>
                    <td>${d.stockName}</td><td>${d.broker}</td>
                    <td class="text-end">${fmt(d.offeringPrice)}</td><td class="text-end">${fmt(d.subscriptionQty)}</td>
                    <td class="text-end">${fmt(d.allocatedQty)}</td><td class="text-end">${fmt(d.soldQty)}</td>
                    <td>${d.soldDate || '-'}</td><td class="text-end">${fmt(d.soldPrice)}</td>
                    <td class="text-end">${fmt(d.taxAndFee)}</td><td class="text-end">${fmt(d.subscriptionFee)}</td>
                    <td class="text-end ${profitClass}">${fmt(d.profit)}</td>
                    <td class="text-end ${profitClass}">${profitRate}</td>
                    <td>
                        <button class="btn btn-outline-warning btn-sm py-0 px-1" onclick='openEditModal(${JSON.stringify(d)})'>수정</button>
                        <button class="btn btn-outline-danger btn-sm py-0 px-1" onclick="deleteIpo(${d.id})">삭제</button>
                    </td>
                </tr>`;
            });
        });
    }

    function openCreateModal() {
        document.getElementById('modalTitle').textContent = '청약 등록';
        document.getElementById('ipoForm').reset();
        document.getElementById('formId').value = '';
        document.getElementById('taxAndFee').value = 0;
        document.getElementById('subscriptionFee').value = 0;
        document.getElementById('soldQty').value = 0;
    }

    function openEditModal(d) {
        document.getElementById('modalTitle').textContent = '청약 수정';
        document.getElementById('formId').value = d.id;
        document.getElementById('stockName').value = d.stockName;
        document.getElementById('broker').value = d.broker;
        document.getElementById('offeringPrice').value = d.offeringPrice;
        document.getElementById('subscriptionQty').value = d.subscriptionQty;
        document.getElementById('allocatedQty').value = d.allocatedQty;
        document.getElementById('soldQty').value = d.soldQty;
        document.getElementById('soldDate').value = d.soldDate || '';
        document.getElementById('soldPrice').value = d.soldPrice || '';
        document.getElementById('taxAndFee').value = d.taxAndFee || 0;
        document.getElementById('subscriptionFee').value = d.subscriptionFee || 0;
        new bootstrap.Modal(document.getElementById('ipoModal')).show();
    }

    function saveIpo() {
        const id = document.getElementById('formId').value;
        const body = {
            stockName: document.getElementById('stockName').value,
            broker: document.getElementById('broker').value,
            offeringPrice: parseInt(document.getElementById('offeringPrice').value),
            subscriptionQty: parseInt(document.getElementById('subscriptionQty').value),
            allocatedQty: parseInt(document.getElementById('allocatedQty').value),
            soldQty: parseInt(document.getElementById('soldQty').value) || 0,
            soldDate: document.getElementById('soldDate').value || null,
            soldPrice: document.getElementById('soldPrice').value ? parseInt(document.getElementById('soldPrice').value) : null,
            taxAndFee: parseInt(document.getElementById('taxAndFee').value) || 0,
            subscriptionFee: parseInt(document.getElementById('subscriptionFee').value) || 0,
            year: parseInt(document.getElementById('yearSelect').value)
        };
        const url = id ? '/api/ipo/' + id : '/api/ipo';
        const method = id ? 'PUT' : 'POST';
        fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        }).then(r => r.json()).then(() => {
            bootstrap.Modal.getInstance(document.getElementById('ipoModal')).hide();
            loadTable(document.getElementById('yearSelect').value);
            loadStocks();
        });
    }

    function deleteIpo(id) {
        if (!confirm('삭제하시겠습니까?')) return;
        fetch('/api/ipo/' + id, { method: 'DELETE' }).then(() => {
            loadTable(document.getElementById('yearSelect').value);
        });
    }

    document.getElementById('yearSelect').addEventListener('change', function() {
        loadTable(this.value);
    });

    loadTable(currentYear);
</script>
</body>
</html>
