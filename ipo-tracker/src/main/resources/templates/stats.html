<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>통계 - 공모주 수익 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f6fa; padding-bottom: 80px; font-size: 14px; }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
            background: #0d6efd; display: flex; border-top: 1px solid #0b5ed7;
        }
        .bottom-nav a {
            flex: 1; color: rgba(255,255,255,0.7); text-decoration: none;
            text-align: center; padding: 10px 0; font-size: 10px; line-height: 1.3;
        }
        .bottom-nav a.active { color: #fff; font-weight: 700; }
        .bottom-nav a span { display: block; font-size: 18px; }

        .top-bar {
            background: #0d6efd; color: #fff; padding: 12px 16px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .top-bar h1 { font-size: 16px; margin: 0; font-weight: 700; }

        .filter-bar {
            padding: 10px 12px; background: #fff;
            border-bottom: 1px solid #e0e0e0;
            display: flex; align-items: center; gap: 8px;
        }
        .filter-bar select { font-size: 14px; padding: 6px 10px; border-radius: 8px; border: 1px solid #ced4da; }
        .filter-bar label { font-size: 13px; color: #495057; margin: 0; }

        .section { padding: 12px; }
        .section-title {
            font-size: 13px; font-weight: 700; color: #0d6efd;
            margin-bottom: 10px; padding-bottom: 6px;
            border-bottom: 2px solid #e7f1ff;
        }

        .tbl-wrap {
            overflow-x: auto; -webkit-overflow-scrolling: touch;
            border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        table.pivot {
            border-collapse: collapse; min-width: 100%;
            background: #fff; font-size: 12px;
        }
        table.pivot th, table.pivot td {
            border: 1px solid #e9ecef;
            padding: 7px 8px; text-align: center; white-space: nowrap;
        }
        table.pivot thead th {
            background: #0d6efd; color: #fff; font-weight: 600; font-size: 11px;
        }
        table.pivot thead th:first-child {
            background: #084fc7; min-width: 70px; text-align: left;
        }
        table.pivot tbody tr:nth-child(even) { background: #f8f9fa; }
        table.pivot tbody td:first-child {
            font-weight: 600; color: #333; text-align: left; background: #f1f3f5;
        }
        table.pivot tfoot td {
            background: #e7f1ff; font-weight: 700; color: #0d6efd;
        }
        table.pivot tfoot td:first-child { text-align: left; }
        .cell-cnt { font-size: 13px; font-weight: 700; color: #212529; }
        .cell-zero { color: #ced4da; }
        .cell-profit { font-size: 10px; color: #198754; margin-top: 1px; }
        .cell-loss   { font-size: 10px; color: #dc3545; margin-top: 1px; }

        .acc-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        .acc-card {
            background: #fff; border-radius: 12px; padding: 14px 14px 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .acc-name { font-size: 13px; font-weight: 700; color: #0d6efd; margin-bottom: 8px; }
        .acc-stat { font-size: 12px; color: #555; line-height: 1.8; }
        .acc-stat strong { color: #212529; }
        .profit-plus { color: #dc3545; font-weight: 700; }
        .profit-minus { color: #0d6efd; font-weight: 700; }

        /* 이달 증권사 공모 건수 */
        .month-sel-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
        .month-sel-bar select { font-size: 13px; padding: 5px 10px; border-radius: 8px; border: 1px solid #ced4da; }
        .month-sel-bar button {
            background: #0d6efd; color: #fff; border: none;
            border-radius: 8px; padding: 6px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .month-sel-bar button:disabled { background: #adb5bd; cursor: default; }
        .broker-rank-list { display: flex; flex-direction: column; gap: 8px; }
        .broker-rank-item {
            background: #fff; border-radius: 10px; padding: 10px 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
            display: flex; align-items: flex-start; gap: 12px;
        }
        .rank-badge {
            min-width: 32px; height: 32px; border-radius: 50%;
            background: #e7f1ff; color: #0d6efd; font-size: 13px; font-weight: 700;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .rank-badge.top1 { background: #ffd700; color: #5a4000; }
        .rank-badge.top2 { background: #c0c0c0; color: #333; }
        .rank-badge.top3 { background: #cd7f32; color: #fff; }
        .rank-info { flex: 1; min-width: 0; }
        .rank-name { font-size: 14px; font-weight: 700; color: #222; }
        .rank-cnt { font-size: 12px; color: #0d6efd; font-weight: 600; margin-bottom: 4px; }
        .rank-ipos { font-size: 11px; color: #6c757d; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bar-wrap { height: 6px; background: #e9ecef; border-radius: 3px; margin-top: 6px; }
        .bar-fill { height: 6px; background: #0d6efd; border-radius: 3px; transition: width 0.4s; }
    </style>
</head>
<body>

<div class="top-bar">
    <h1>📈 통계</h1>
</div>

<div class="filter-bar">
    <label>연도</label>
    <select id="yearSelect"></select>
</div>

<!-- ── 이달 증권사별 공모 참여 건수 ── -->
<div class="section">
    <div class="section-title">🏦 증권사별 공모 참여 건수 (kokstock)</div>
    <div class="month-sel-bar">
        <select id="bsYear"></select>
        <select id="bsMonth"></select>
        <button id="bsBtn" onclick="loadBrokerStats()">조회</button>
    </div>
    <div id="brokerRankWrap">
        <div style="text-align:center;padding:20px;color:#adb5bd;font-size:13px">
            조회 버튼을 누르면 해당 월의 공모주 일정을 불러와<br>증권사별 참여 건수를 집계합니다.
        </div>
    </div>
</div>

<div class="section">
    <div class="section-title">증권사별 월별 청약 건수 (내 기록)</div>
    <div class="tbl-wrap" id="brokerTableWrap">
        <div style="text-align:center;padding:30px;color:#adb5bd">로딩 중...</div>
    </div>
</div>

<div class="section">
    <div class="section-title">계좌별 수익 현황</div>
    <div class="acc-grid" id="accGrid">
        <div style="text-align:center;padding:30px;color:#adb5bd;grid-column:span 2">로딩 중...</div>
    </div>
</div>

<nav class="bottom-nav">
    <a href="/"><span>📊</span>대시보드</a>
    <a href="/ipo"><span>📋</span>청약내역</a>
    <a href="/calendar"><span>📅</span>캘린더</a>
    <a href="/checklist"><span>✅</span>체크</a>
    <a href="/stats" class="active"><span>📈</span>통계</a>
</nav>

<script src="/js/common.js"></script>
<script>
    const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    const ACCOUNTS = getAccountNames(); // 설정에서 관리 (common.js: getAccountNames)

    (function initYear() {
        const sel = document.getElementById('yearSelect');
        const cur = new Date().getFullYear();
        for (let y = cur; y >= cur - 3; y--) {
            const opt = document.createElement('option');
            opt.value = opt.textContent = y;
            sel.appendChild(opt);
        }
        sel.value = cur;
    })();

    // ── 증권사 공모 건수 조회 (kokstock) ──────────────────
    (function initBsSelectors() {
        const now = new Date();
        const ysel = document.getElementById('bsYear');
        const msel = document.getElementById('bsMonth');
        const cur = now.getFullYear();
        for (let y = cur; y >= cur - 2; y--) {
            const o = document.createElement('option');
            o.value = o.textContent = y;
            ysel.appendChild(o);
        }
        ysel.value = cur;
        for (let m = 1; m <= 12; m++) {
            const o = document.createElement('option');
            o.value = m;
            o.textContent = m + '월';
            msel.appendChild(o);
        }
        msel.value = now.getMonth() + 1;
    })();

    async function loadBrokerStats() {
        const year  = document.getElementById('bsYear').value;
        const month = document.getElementById('bsMonth').value;
        const wrap  = document.getElementById('brokerRankWrap');
        const btn   = document.getElementById('bsBtn');

        btn.disabled = true;
        btn.textContent = '조회 중...';
        wrap.innerHTML = '<div style="text-align:center;padding:30px;color:#adb5bd;font-size:13px">종목별 상세를 불러오는 중입니다<br>잠시만 기다려주세요...</div>';

        try {
            const data = await fetch(`/api/dart/broker-stats?year=${year}&month=${month}`).then(r => r.json());

            if (!data.length) {
                wrap.innerHTML = '<div style="text-align:center;padding:20px;color:#adb5bd">해당 월 데이터 없음</div>';
                return;
            }

            const max = data[0].count;
            const rankClass = (i) => i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
            let html = '<div class="broker-rank-list">';
            data.forEach((b, i) => {
                const pct = Math.round((b.count / max) * 100);
                html += `
                <div class="broker-rank-item">
                    <div class="rank-badge ${rankClass(i)}">${i + 1}</div>
                    <div class="rank-info">
                        <div class="rank-name">${b.brokerName}</div>
                        <div class="rank-cnt">${b.count}개 공모 참여</div>
                        <div class="rank-ipos">${b.ipos.join(', ')}</div>
                        <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div>
                    </div>
                </div>`;
            });
            html += '</div>';
            wrap.innerHTML = html;
        } catch (e) {
            wrap.innerHTML = '<div style="text-align:center;padding:20px;color:#dc3545">오류: ' + e.message + '</div>';
        } finally {
            btn.disabled = false;
            btn.textContent = '조회';
        }
    }

    function fmt(n) {
        if (n == null) return '-';
        return (n >= 0 ? '+' : '') + n.toLocaleString('ko-KR') + '원';
    }

    function calcProfit(item) {
        if (item.soldPrice == null || item.soldPrice === '') return null;
        return (Number(item.soldPrice) - Number(item.offeringPrice)) * Number(item.soldQty || 0)
             - Number(item.taxAndFee || 0);
    }

    async function buildStats(year) {
        const list = await fetch('/api/ipo?year=' + year).then(r => r.json());
        list.forEach(item => { item._profit = calcProfit(item); });
        buildBrokerTable(list);
        buildAccGrid(list);
    }

    function buildBrokerTable(list) {
        const wrap = document.getElementById('brokerTableWrap');
        const brokerSet = new Set();
        const data = {};

        list.forEach(item => {
            const b = item.broker;
            if (!b) return;
            const dateStr = item.subscriptionStartDate || item.listingDate;
            if (!dateStr) return;
            const m = parseInt(dateStr.substring(5, 7));
            if (isNaN(m)) return;

            brokerSet.add(b);
            if (!data[b]) data[b] = {};
            if (!data[b][m]) data[b][m] = { cnt: 0, profit: 0 };
            data[b][m].cnt++;
            if (item._profit != null) data[b][m].profit += item._profit;
        });

        const brokers = [...brokerSet].sort((a, b) => a.localeCompare(b, 'ko'));
        if (!brokers.length) {
            wrap.innerHTML = '<div style="text-align:center;padding:30px;color:#adb5bd">데이터 없음</div>';
            return;
        }

        const monthTotals = {};
        for (let m = 1; m <= 12; m++) {
            monthTotals[m] = { cnt: 0, profit: 0 };
            brokers.forEach(b => {
                if (data[b]?.[m]) {
                    monthTotals[m].cnt    += data[b][m].cnt;
                    monthTotals[m].profit += data[b][m].profit;
                }
            });
        }

        let html = '<table class="pivot"><thead><tr><th>증권사</th>';
        for (let m = 1; m <= 12; m++) html += `<th>${MONTHS[m-1]}</th>`;
        html += '<th>합계</th></tr></thead><tbody>';

        brokers.forEach(b => {
            let rowCnt = 0, rowProfit = 0;
            html += `<tr><td>${b}</td>`;
            for (let m = 1; m <= 12; m++) {
                const cell = data[b]?.[m];
                if (!cell || cell.cnt === 0) {
                    html += '<td class="cell-zero">-</td>';
                } else {
                    rowCnt += cell.cnt; rowProfit += cell.profit;
                    const pCls = cell.profit > 0 ? 'cell-profit' : cell.profit < 0 ? 'cell-loss' : '';
                    const pTxt = cell.profit !== 0 ? `<div class="${pCls}">${fmt(Math.round(cell.profit))}</div>` : '';
                    html += `<td><div class="cell-cnt">${cell.cnt}</div>${pTxt}</td>`;
                }
            }
            const rCls = rowProfit > 0 ? 'cell-profit' : rowProfit < 0 ? 'cell-loss' : '';
            html += `<td><div class="cell-cnt">${rowCnt}</div><div class="${rCls}">${fmt(Math.round(rowProfit))}</div></td></tr>`;
        });

        html += '</tbody><tfoot><tr><td>합계</td>';
        let grandCnt = 0, grandProfit = 0;
        for (let m = 1; m <= 12; m++) {
            const t = monthTotals[m];
            grandCnt += t.cnt; grandProfit += t.profit;
            if (t.cnt === 0) {
                html += '<td class="cell-zero">-</td>';
            } else {
                const pCls = t.profit > 0 ? 'cell-profit' : t.profit < 0 ? 'cell-loss' : '';
                html += `<td><div class="cell-cnt">${t.cnt}</div><div class="${pCls}">${fmt(Math.round(t.profit))}</div></td>`;
            }
        }
        const gCls = grandProfit > 0 ? 'cell-profit' : grandProfit < 0 ? 'cell-loss' : '';
        html += `<td><div class="cell-cnt">${grandCnt}</div><div class="${gCls}">${fmt(Math.round(grandProfit))}</div></td></tr></tfoot></table>`;
        wrap.innerHTML = html;
    }

    function buildAccGrid(list) {
        const grid = document.getElementById('accGrid');
        const acc = {};
        ACCOUNTS.forEach(a => { acc[a] = { cnt: 0, profit: 0, pending: 0 }; });

        list.forEach(item => {
            if (!item.accounts) return;
            item.accounts.split(',').map(s => s.trim()).filter(Boolean).forEach(name => {
                if (!acc[name]) return;
                acc[name].cnt++;
                if (item._profit != null) acc[name].profit += item._profit;
                else acc[name].pending++;
            });
        });

        let html = '';
        ACCOUNTS.forEach(name => {
            const a = acc[name];
            const pCls = a.profit > 0 ? 'profit-plus' : a.profit < 0 ? 'profit-minus' : '';
            html += `
            <div class="acc-card">
                <div class="acc-name">${name}</div>
                <div class="acc-stat">
                    청약건수 <strong>${a.cnt}건</strong><br>
                    수익합계 <span class="${pCls}">${fmt(Math.round(a.profit))}</span><br>
                    미확정 <strong>${a.pending}건</strong>
                </div>
            </div>`;
        });
        grid.innerHTML = html || '<div style="grid-column:span 2;text-align:center;color:#adb5bd">데이터 없음</div>';
    }

    document.getElementById('yearSelect').addEventListener('change', function () {
        buildStats(this.value);
    });

    buildStats(new Date().getFullYear());
</script>
</body>
</html>
